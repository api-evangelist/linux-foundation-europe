aid: linux-foundation-europe
name: Linux Foundation Europe
description: >-
  Linux Foundation Europe is a regional hub under the Linux Foundation for
  European open source projects, governance, and collaboration. It hosts
  OpenWallet Foundation, Servo, NeoNephos, and other projects, providing a
  European framework for open source innovation and digital sovereignty.
